<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码识别器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; color: #333; }
        .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 24px; margin-bottom: 16px; }
        .upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: border-color 0.3s; }
        .upload-area:hover { border-color: #007bff; }
        .upload-area input { display: none; }
        .upload-icon { font-size: 3rem; margin-bottom: 12px; }
        .btn { padding: 8px 20px; border-radius: 4px; cursor: pointer; border: none; font-size: 14px; margin-right: 8px; }
        .btn-blue { background: #007bff; color: #fff; }
        .btn-green { background: #28a745; color: #fff; }
        .result { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-top: 16px; }
        .result-label { font-weight: 500; color: #666; margin-bottom: 8px; }
        .result-value { font-family: monospace; word-break: break-all; padding: 12px; background: #fff; border-radius: 4px; border: 1px solid #ddd; }
        .preview { max-width: 100%; max-height: 300px; margin: 16px auto; display: block; border: 1px solid #ddd; border-radius: 4px; }
        .error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 4px; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>二维码识别器</h1>
        <div class="card">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📷</div>
                <div>点击上传二维码图片</div>
                <div style="font-size:12px;color:#666;margin-top:8px;">支持 PNG, JPG, GIF, BMP 格式</div>
                <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])">
            </div>
        </div>
        <div class="card" id="resultCard" style="display:none;">
            <div class="result-label">识别结果:</div>
            <div class="result-value" id="resultText"></div>
            <div style="margin-top:12px;">
                <button class="btn btn-green" onclick="copyResult()">复制结果</button>
                <button class="btn btn-blue" onclick="openLink()" id="openBtn" style="display:none;">打开链接</button>
            </div>
        </div>
        <div class="card" id="imageCard" style="display:none;">
            <img id="preview" class="preview">
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        function handleFile(file) {
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('imageCard').style.display = 'block';
                    decodeQR(e.target.result);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function decodeQR(dataUrl) {
            const img = document.getElementById('preview');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.naturalWidth || img.width;
            canvas.height = img.naturalHeight || img.height;
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);
            
            if (code) {
                document.getElementById('resultCard').style.display = 'block';
                document.getElementById('resultText').textContent = code.data;
                
                const isUrl = /^https?:\/\//i.test(code.data);
                document.getElementById('openBtn').style.display = isUrl ? 'inline-block' : 'none';
            } else {
                document.getElementById('resultCard').style.display = 'block';
                document.getElementById('resultText').innerHTML = '<span style="color:#dc3545;">未能识别出二维码，请确保图片清晰且包含有效的二维码</span>';
                document.getElementById('openBtn').style.display = 'none';
            }
        }
        
        function copyResult() {
            const text = document.getElementById('resultText').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                btn.textContent = '已复制!';
                setTimeout(() => btn.textContent = '复制结果', 1500);
            });
        }
        
        function openLink() {
            const text = document.getElementById('resultText').textContent;
            if (/^https?:\/\//i.test(text)) {
                window.open(text, '_blank');
            }
        }
    </script>
</body>
</html>
